<svg viewBox="0 0 1000 460" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
  </defs>

  <rect width="1000" height="460" fill="#ffffff"/>

  <!-- Row labels -->
  <text x="20" y="30" font-size="15" font-weight="700" fill="#334155">INGESTION (once per uploaded file)</text>
  <text x="20" y="290" font-size="15" font-weight="700" fill="#334155">QUERY (once per question)</text>

  <!-- ===== TOP ROW: Ingestion ===== -->
  <!-- Box 1 -->
  <rect x="30" y="60" width="190" height="90" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="125" y="98" font-size="13" fill="#1e293b" text-anchor="middle" font-weight="600">Upload</text>
  <text x="125" y="118" font-size="13" fill="#1e293b" text-anchor="middle">PDF or image</text>
  <text x="125" y="136" font-size="11" fill="#64748b" text-anchor="middle">(browser UI or CLI)</text>

  <line x1="220" y1="105" x2="248" y2="105" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 2 -->
  <rect x="250" y="60" width="190" height="90" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="345" y="92" font-size="13" fill="#1e293b" text-anchor="middle" font-weight="600">PyMuPDF</text>
  <text x="345" y="112" font-size="12" fill="#1e293b" text-anchor="middle">extract text +</text>
  <text x="345" y="128" font-size="12" fill="#1e293b" text-anchor="middle">render page image</text>

  <line x1="440" y1="105" x2="468" y2="105" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 3 -->
  <rect x="470" y="60" width="190" height="90" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="565" y="98" font-size="13" fill="#1e293b" text-anchor="middle" font-weight="600">CLIP Encoder</text>
  <text x="565" y="118" font-size="12" fill="#1e293b" text-anchor="middle">text encoder +</text>
  <text x="565" y="134" font-size="12" fill="#1e293b" text-anchor="middle">image encoder</text>

  <line x1="660" y1="105" x2="688" y2="105" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 4: ChromaDB (store) -->
  <rect x="690" y="60" width="190" height="90" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="785" y="98" font-size="13" fill="#4c1d95" text-anchor="middle" font-weight="700">ChromaDB</text>
  <text x="785" y="118" font-size="12" fill="#4c1d95" text-anchor="middle">stores vectors +</text>
  <text x="785" y="134" font-size="12" fill="#4c1d95" text-anchor="middle">base64 images</text>

  <!-- Connector between the two ChromaDB touchpoints -->
  <line x1="785" y1="150" x2="490" y2="320" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="640" y="225" font-size="11" fill="#7c3aed" text-anchor="middle" font-style="italic">same database</text>

  <!-- ===== BOTTOM ROW: Query ===== -->
  <!-- Box 5 -->
  <rect x="25" y="320" width="170" height="90" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="110" y="358" font-size="13" fill="#1e293b" text-anchor="middle" font-weight="600">User</text>
  <text x="110" y="378" font-size="13" fill="#1e293b" text-anchor="middle">question</text>

  <line x1="195" y1="365" x2="213" y2="365" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 6 -->
  <rect x="215" y="320" width="170" height="90" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="300" y="358" font-size="13" fill="#1e293b" text-anchor="middle" font-weight="600">CLIP text</text>
  <text x="300" y="378" font-size="13" fill="#1e293b" text-anchor="middle">encoder</text>

  <line x1="385" y1="365" x2="403" y2="365" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 7: ChromaDB (search) -->
  <rect x="405" y="320" width="170" height="90" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="490" y="356" font-size="13" fill="#4c1d95" text-anchor="middle" font-weight="700">ChromaDB</text>
  <text x="490" y="376" font-size="12" fill="#4c1d95" text-anchor="middle">similarity search</text>
  <text x="490" y="392" font-size="11" fill="#4c1d95" text-anchor="middle">(top-k text + images)</text>

  <line x1="575" y1="365" x2="593" y2="365" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 8: Groq -->
  <rect x="595" y="320" width="180" height="90" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="685" y="356" font-size="13" fill="#7c2d12" text-anchor="middle" font-weight="700">Groq LLM</text>
  <text x="685" y="376" font-size="12" fill="#7c2d12" text-anchor="middle">text or vision model,</text>
  <text x="685" y="392" font-size="12" fill="#7c2d12" text-anchor="middle">grounded by context</text>

  <line x1="775" y1="365" x2="793" y2="365" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 9: Answer -->
  <rect x="795" y="320" width="180" height="90" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="885" y="358" font-size="13" fill="#1e293b" text-anchor="middle" font-weight="600">Grounded answer</text>
  <text x="885" y="378" font-size="12" fill="#1e293b" text-anchor="middle">+ page/timestamp</text>
  <text x="885" y="394" font-size="12" fill="#1e293b" text-anchor="middle">sources</text>

  <text x="20" y="445" font-size="11" fill="#94a3b8">VisualRAG — CLIP (OpenCLIP ViT-B-32) + ChromaDB + Groq, served via FastAPI + Gradio</text>
</svg>
